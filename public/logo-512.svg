<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#052e16"/>

  <!-- Vault door outer ring -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#22c55e" stroke-width="20"/>

  <!-- Vault door inner ring -->
  <circle cx="256" cy="256" r="112" fill="none" stroke="#16a34a" stroke-width="12"/>

  <!-- Combination dial ticks at 12 / 3 / 6 / 9 o'clock -->
  <line x1="256" y1="64"  x2="256" y2="112" stroke="#22c55e" stroke-width="20" stroke-linecap="round"/>
  <line x1="448" y1="256" x2="400" y2="256" stroke="#22c55e" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="448" x2="256" y2="400" stroke="#22c55e" stroke-width="20" stroke-linecap="round"/>
  <line x1="64"  y1="256" x2="112" y2="256" stroke="#22c55e" stroke-width="20" stroke-linecap="round"/>

  <!-- Diagonal ticks -->
  <line x1="380" y1="132" x2="346" y2="166" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="380" y1="380" x2="346" y2="346" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="132" y1="380" x2="166" y2="346" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="132" y1="132" x2="166" y2="166" stroke="#22c55e" stroke-width="10" stroke-linecap="round" opacity="0.5"/>

  <!-- Center knob -->
  <circle cx="256" cy="256" r="44" fill="#22c55e"/>

  <!-- R$ text -->
  <text x="256" y="276" text-anchor="middle" fill="#052e16"
        font-size="52" font-family="'Arial', sans-serif" font-weight="900"
        letter-spacing="-2">R$</text>
</svg>
