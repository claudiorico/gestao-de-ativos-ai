<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#052e16"/>

  <!-- Vault door outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Vault door inner ring -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Combination dial ticks at 12 / 3 / 6 / 9 o'clock -->
  <line x1="32" y1="8"  x2="32" y2="14" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="32" x2="50" y2="32" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="32" y2="50" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8"  y1="32" x2="14" y2="32" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center knob -->
  <circle cx="32" cy="32" r="5.5" fill="#22c55e"/>

  <!-- R$ text -->
  <text x="32" y="35.5" text-anchor="middle" fill="#052e16"
        font-size="6.5" font-family="'Arial', sans-serif" font-weight="900"
        letter-spacing="-0.5">R$</text>
</svg>
